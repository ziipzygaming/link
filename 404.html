<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — page not found · ziipzy.qzz.io</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07090f;
    --surface: #0d1017;
    --surface2: #111520;
    --border: #1a2136;
    --border-lit: #263050;
    --accent: #0062ff;
    --accent-lo: rgba(0,98,255,0.10);
    --err: #ff4e6a;
    --err-lo: rgba(255,78,106,0.10);
    --text: #cdd5e8;
    --text-muted: #4e5f80;
    --text-faint: #1c2840;
    --mono: 'Space Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--text-faint) 1px, transparent 1px),
      linear-gradient(90deg, var(--text-faint) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.22;
    pointer-events: none;
  }

  /* scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
  }

  /* centered layout */
  .page {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  /* glitch 404 */
  .code-wrap {
    position: relative;
    margin-bottom: 2.5rem;
  }

  .big-code {
    font-family: var(--display);
    font-size: clamp(6rem, 22vw, 13rem);
    font-weight: 800;
    color: transparent;
    -webkit-text-stroke: 1px var(--border-lit);
    letter-spacing: -0.05em;
    line-height: 1;
    user-select: none;
    position: relative;
  }

  .big-code::before,
  .big-code::after {
    content: '404';
    position: absolute;
    inset: 0;
    font-family: var(--display);
    font-size: inherit;
    font-weight: 800;
    letter-spacing: inherit;
    line-height: inherit;
  }

  .big-code::before {
    color: var(--accent);
    -webkit-text-stroke: 0;
    clip-path: polygon(0 0, 100% 0, 100% 38%, 0 38%);
    animation: glitch-top 4s infinite;
    opacity: 0.7;
  }

  .big-code::after {
    color: var(--err);
    -webkit-text-stroke: 0;
    clip-path: polygon(0 62%, 100% 62%, 100% 100%, 0 100%);
    animation: glitch-bot 4s infinite;
    opacity: 0.7;
  }

  @keyframes glitch-top {
    0%, 80%, 100% { transform: translate(0,0); opacity:0; }
    82% { transform: translate(-3px, -2px); opacity:0.7; }
    84% { transform: translate(3px, 0); opacity:0.7; }
    86% { transform: translate(-1px, -3px); opacity:0.7; }
    88% { transform: translate(0,0); opacity:0; }
  }

  @keyframes glitch-bot {
    0%, 80%, 100% { transform: translate(0,0); opacity:0; }
    83% { transform: translate(3px, 2px); opacity:0.7; }
    85% { transform: translate(-3px, 0); opacity:0.7; }
    87% { transform: translate(2px, 3px); opacity:0.7; }
    89% { transform: translate(0,0); opacity:0; }
  }

  /* terminal block */
  .terminal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 18px 22px;
    max-width: 460px;
    width: 100%;
    margin-bottom: 2rem;
    text-align: left;
  }

  .terminal-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }

  .terminal-title {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.07em;
    margin-left: auto;
  }

  .terminal-line {
    font-size: 12px;
    line-height: 2;
    color: var(--text-muted);
    display: flex;
    gap: 10px;
  }

  .terminal-line .prompt { color: var(--accent); flex-shrink: 0; }
  .terminal-line .cmd { color: var(--text); }
  .terminal-line .out { color: var(--err); }
  .terminal-line .ok  { color: #00d68f; }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: var(--accent);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1.1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* heading */
  .msg-head {
    font-family: var(--display);
    font-size: 1.15rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }

  .msg-sub {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.8;
    margin-bottom: 1.8rem;
    max-width: 320px;
  }

  /* buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-primary {
    background: var(--accent);
    border: none;
    border-radius: 3px;
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    padding: 11px 22px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-primary:hover { background: #1a74ff; }
  .btn-primary:active { transform: scale(0.96); }

  .btn-ghost {
    background: none;
    border: 1px solid var(--border-lit);
    border-radius: 3px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    padding: 11px 22px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* breadcrumb at top */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    background: rgba(7,9,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    font-family: var(--display);
    font-weight: 800;
    font-size: 0.95rem;
    color: #fff;
    letter-spacing: -0.03em;
  }

  .logo-ring {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
  }

  .logo-ring::after {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }

  .error-badge {
    font-size: 10px;
    color: var(--err);
    border: 1px solid rgba(255,78,106,0.3);
    background: var(--err-lo);
    padding: 4px 11px;
    border-radius: 3px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* entry anim */
  .page > * {
    animation: rise 0.5s ease both;
  }

  .page > *:nth-child(1) { animation-delay: 0.05s; }
  .page > *:nth-child(2) { animation-delay: 0.15s; }
  .page > *:nth-child(3) { animation-delay: 0.22s; }
  .page > *:nth-child(4) { animation-delay: 0.3s; }
  .page > *:nth-child(5) { animation-delay: 0.37s; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .top-bar { padding: 0.9rem 1.2rem; }
    .btn-row { flex-direction: column; align-items: stretch; }
    .btn-primary, .btn-ghost { text-align: center; }
    .terminal { padding: 14px 14px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <a class="logo" href="https://ziipzy.qzz.io">
    <div class="logo-ring"></div>
    ziipzy.qzz.io
  </a>
  <span class="error-badge">Error 404</span>
</div>

<div class="page">
  <div class="code-wrap">
    <div class="big-code">404</div>
  </div>

  <div class="terminal">
    <div class="terminal-bar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span class="terminal-title">bash — ziipzy.qzz.io</span>
    </div>
    <div class="terminal-line">
      <span class="prompt">~$</span>
      <span class="cmd">GET <span id="path-display">/???</span></span>
    </div>
    <div class="terminal-line">
      <span class="prompt">&gt;</span>
      <span class="out">404 not found — this route does not exist</span>
    </div>
    <div class="terminal-line">
      <span class="prompt">&gt;</span>
      <span class="ok">hint: try /link for the link tools</span>
    </div>
    <div class="terminal-line">
      <span class="prompt">~$</span>
      <span class="cmd"><span class="cursor"></span></span>
    </div>
  </div>

  <p class="msg-head">Nothing here.</p>
  <p class="msg-sub">The page you're looking for doesn't exist or was moved. Head back to the link tools or the homepage.</p>

  <div class="btn-row">
    <a class="btn-primary" href="/link">→ Link Tools</a>
    <a class="btn-ghost" href="https://ziipzy.qzz.io">Homepage</a>
  </div>
</div>

<script>
  // show the actual path that was attempted
  const path = window.location.pathname || '/???';
  document.getElementById('path-display').textContent = path;
</script>
</body>
</html>
